<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnScript — Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fdf6f0; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  nav {
    background: linear-gradient(135deg, #a8d5a2, #f9c6d0);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand { font-family: 'Pinyon Script', cursive; font-size: 2rem; color: #3a5a3a; }
  .nav-right { display: flex; gap: 1rem; align-items: center; }
  .nav-user { font-size: 0.85rem; color: #4a7a4a; }
  .nav-btn {
    padding: 0.4rem 1rem; border-radius: 20px;
    border: 1.5px solid #3a5a3a; background: transparent;
    color: #3a5a3a; font-family: 'DM Sans', sans-serif;
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
  }
  .nav-btn:hover { background: #3a5a3a; color: white; }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
  .page-title { font-family: 'Pinyon Script', cursive; font-size: 3rem; color: #c06080; margin-bottom: 0.5rem; }
  .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
  .search-bar { display: flex; gap: 1rem; margin-bottom: 2rem; }
  .search-bar input {
    flex: 1; padding: 0.7rem 1rem;
    border: 1.5px solid #e8d5dc; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    background: white; outline: none;
  }
  .search-bar input:focus { border-color: #c06080; }
  .search-bar button {
    padding: 0.7rem 1.5rem;
    background: linear-gradient(135deg, #a8d5a2, #c06080);
    color: white; border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
  .card {
    background: white; border-radius: 16px;
    border: 1.5px solid #f0e0e8; padding: 1.5rem;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(192,96,128,0.1); }
  .card-cat {
    display: inline-block; padding: 0.25rem 0.75rem;
    background: #e8f5e8; color: #3a7a3a;
    border-radius: 20px; font-size: 0.75rem; margin-bottom: 0.75rem;
  }
  .card h3 { font-size: 1.1rem; color: #333; margin-bottom: 0.5rem; font-weight: 500; }
  .card p { font-size: 0.85rem; color: #888; margin-bottom: 1rem; line-height: 1.6; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .instructor { font-size: 0.8rem; color: #c06080; }
  .enroll-btn {
    padding: 0.4rem 1rem; background: #fdf6f0;
    border: 1.5px solid #c06080; color: #c06080;
    border-radius: 20px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
    transition: all 0.2s;
  }
  .enroll-btn:hover { background: #c06080; color: white; }
  .loading { text-align: center; padding: 3rem; color: #aaa; font-family: 'Pinyon Script', cursive; font-size: 2rem; }
  .create-fab {
    position: fixed; bottom: 2rem; right: 2rem;
    background: linear-gradient(135deg, #a8d5a2, #c06080);
    color: white; border: none; border-radius: 50px;
    padding: 0.85rem 1.5rem; font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; cursor: pointer; display: none;
    box-shadow: 0 4px 16px rgba(192,96,128,0.3);
  }
  .msg { padding: 0.5rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem; display: none; }
  .msg.success { background: #e8f5e8; color: #3a7a3a; display: block; }
  .msg.err { background: #fde8ee; color: #c06080; display: block; }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">LearnScript</div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="nav-btn" onclick="window.location.href='my-courses.html'">My Courses</button>
    <button class="nav-btn" onclick="handleLoginLogout()" id="login-btn">Login</button>
  </div>
</nav>
<div class="container">
  <div class="page-title">Courses</div>
  <div class="subtitle">Discover something beautiful to learn today</div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search by category (e.g. Programming, Design...)">
    <button onclick="searchCourses()">Search</button>
    <button onclick="loadCourses()" style="background:#a8d5a2">All</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="grid" id="course-grid"><div class="loading">Loading courses...</div></div>
</div>
<button class="create-fab" id="create-fab" onclick="window.location.href='create-course.html'">+ Create Course</button>
<script>
  const API = 'http://localhost:5170';
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  const username = localStorage.getItem('username');

  if (username) {
    document.getElementById('nav-user').textContent = `Hi, ${username} (${role})`;
    document.getElementById('login-btn').textContent = 'Logout';
    if (role === 'Instructor' || role === 'Admin')
      document.getElementById('create-fab').style.display = 'block';
  }

  function handleLoginLogout() {
    if (token) {
      localStorage.clear();
      window.location.reload();
    } else {
      window.location.href = 'login.html';
    }
  }

  async function loadCourses() {
    const grid = document.getElementById('course-grid');
    grid.innerHTML = '<div class="loading">Loading courses...</div>';
    try {
      const res = await fetch(`${API}/api/v1/courses`);
      const courses = await res.json();
      renderCourses(courses);
    } catch { grid.innerHTML = '<div class="loading">Could not load courses</div>'; }
  }

  async function searchCourses() {
    const cat = document.getElementById('search').value.trim();
    if (!cat) return loadCourses();
    try {
      const res = await fetch(`${API}/api/v1/courses/category/${encodeURIComponent(cat)}`);
      const courses = await res.json();
      renderCourses(courses);
    } catch { showMsg('Search failed', 'err'); }
  }

  function renderCourses(courses) {
    const grid = document.getElementById('course-grid');
    if (!courses.length) { grid.innerHTML = '<div class="loading">No courses found</div>'; return; }
    grid.innerHTML = courses.map(c => `
      <div class="card">
        <span class="card-cat">${c.category}</span>
        <h3>${c.title}</h3>
        <p>${c.description}</p>
        <div class="card-footer">
          <span class="instructor">by ${c.instructorName || 'Unknown'}</span>
          <button class="enroll-btn" onclick="enroll(${c.id})">Enroll</button>
        </div>
      </div>`).join('');
  }

  async function enroll(courseId) {
    if (!token) { showMsg('Please login to enroll', 'err'); return; }
    const payload = JSON.parse(atob(token.split('.')[1]));
    const userId = parseInt(payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"]);
    try {
      const res = await fetch(`${API}/api/v1/enroll`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ userId, courseId })
      });
      const data = await res.json();
      if (res.ok) showMsg('Enrolled successfully! Check My Courses.', 'success');
      else showMsg(data.error || 'Enrollment failed', 'err');
    } catch { showMsg('Server error', 'err'); }
  }

  function showMsg(text, type) {
    const m = document.getElementById('msg');
    m.textContent = text; m.className = `msg ${type}`;
    setTimeout(() => m.style.display = 'none', 3000);
  }

  loadCourses();
</script>
</body>
</html>
