<!DOCTYPE html>
<html>
<head>
<title>Cute Birthday Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>🎀 Happy Birthday! 🎂</h1>

<p class="message">
Hope your day is filled with smiles, cake, and lots of love! 💕
</p>

<button onclick="showSurprise()">Open Surprise 🎁</button>

<p id="surprise" class="hidden">
✨ Wishing you lots of joy, laughter, and sweet memories! 💖
</p>

</div>

<script src="script.js"></script>

</body>
</html>
