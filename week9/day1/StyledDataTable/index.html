<!DOCTYPE html>
<html>
<head>
    <title>Student Grades Table</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 40px;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse; /* Removes double borders */
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        caption {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        /* Alternate row colors */
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        /* Hover effect */
        tr:hover {
            background-color: #d6eaf8;
        }
    </style>
</head>

<body>

<table>
    <caption>Student Grade Report</caption>

    <tr>
        <th>Student ID</th>
        <th>Name</th>
        <th>Subject</th>
        <th>Marks</th>
        <th>Grade</th>
    </tr>

    <tr>
        <td>101</td>
        <td>Khushi</td>
        <td>Mathematics</td>
        <td>92</td>
        <td>A</td>
    </tr>

    <tr>
        <td>102</td>
        <td>Riya</td>
        <td>Science</td>
        <td>85</td>
        <td>B+</td>
    </tr>

    <tr>
        <td>103</td>
        <td>Aman</td>
        <td>English</td>
        <td>88</td>
        <td>A</td>
    </tr>

    <tr>
        <td>104</td>
        <td>Rahul</td>
        <td>Computer</td>
        <td>95</td>
        <td>A+</td>
    </tr>

</table>

</body>
</html>
